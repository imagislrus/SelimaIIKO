<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Загрузка накладной</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; padding: 16px; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 16px; text-align: center; }
    .upload-area {
      border: 2px dashed #ccc; border-radius: 12px; padding: 40px 20px;
      text-align: center; background: #fff; cursor: pointer; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .upload-area.active { border-color: #4CAF50; background: #f0fff0; }
    .upload-area p { color: #666; font-size: 16px; }
    .preview { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .preview img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
    .btn {
      width: 100%; padding: 14px; font-size: 18px; border: none; border-radius: 10px;
      background: #4CAF50; color: #fff; cursor: pointer; font-weight: 600;
    }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .status { text-align: center; margin-top: 16px; font-size: 16px; }
    .status.error { color: #e53935; }
    .status.success { color: #4CAF50; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Загрузка накладной</h1>
    <div class="upload-area" id="dropArea">
      <p>Нажмите или перетащите фото накладной</p>
      <input type="file" id="fileInput" accept="image/*" multiple capture="environment" hidden>
    </div>
    <div class="preview" id="preview"></div>
    <button class="btn" id="sendBtn" disabled>Отправить</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { document.body.innerHTML = '<p style="text-align:center;margin-top:40px;color:red;">Нет токена доступа</p>'; }

    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    let files = [];

    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('active'); });
    dropArea.addEventListener('dragleave', () => dropArea.classList.remove('active'));
    dropArea.addEventListener('drop', e => {
      e.preventDefault(); dropArea.classList.remove('active');
      addFiles(e.dataTransfer.files);
    });
    fileInput.addEventListener('change', () => addFiles(fileInput.files));

    function addFiles(newFiles) {
      for (const f of newFiles) {
        if (files.length >= 10) break;
        files.push(f);
        const img = document.createElement('img');
        img.src = URL.createObjectURL(f);
        preview.appendChild(img);
      }
      sendBtn.disabled = files.length === 0;
    }

    sendBtn.addEventListener('click', async () => {
      sendBtn.disabled = true;
      status.className = 'status';
      status.textContent = 'Отправка...';

      const fd = new FormData();
      files.forEach(f => fd.append('photos', f));

      try {
        const res = await fetch(`/upload?token=${token}`, { method: 'POST', body: fd });
        const data = await res.json();
        if (data.success) {
          status.className = 'status success';
          status.textContent = 'Накладная отправлена! Спасибо.';
          files = [];
          preview.innerHTML = '';
        } else {
          throw new Error(data.error || 'Ошибка');
        }
      } catch (err) {
        status.className = 'status error';
        status.textContent = err.message;
        sendBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
